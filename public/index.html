<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vybe Program Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a1a;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;overflow:hidden}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.bg .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;animation:float 8s ease-in-out infinite}
.bg .orb:nth-child(1){width:400px;height:400px;background:linear-gradient(135deg,#7c3aed,#06b6d4);top:-100px;left:-100px;animation-delay:0s}
.bg .orb:nth-child(2){width:350px;height:350px;background:linear-gradient(135deg,#ec4899,#f59e0b);bottom:-80px;right:-80px;animation-delay:-3s}
.bg .orb:nth-child(3){width:250px;height:250px;background:linear-gradient(135deg,#10b981,#3b82f6);top:50%;left:60%;animation-delay:-5s}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-40px) scale(1.05)}}
.content{position:relative;z-index:1;text-align:center;padding:2rem}
.logo{font-size:4rem;font-weight:800;background:linear-gradient(135deg,#7c3aed,#06b6d4,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem;animation:glow 3s ease-in-out infinite alternate}
@keyframes glow{0%{filter:brightness(1)}100%{filter:brightness(1.3)}}
.tagline{font-size:1.3rem;color:rgba(255,255,255,.7);margin-bottom:2.5rem;letter-spacing:.5px}
.btn{display:inline-block;padding:14px 40px;border:2px solid rgba(124,58,237,.6);border-radius:50px;color:#c4b5fd;font-size:1rem;text-decoration:none;transition:all .3s;cursor:pointer;background:rgba(124,58,237,.1);backdrop-filter:blur(10px);animation:pulse 2s ease-in-out infinite}
.btn:hover{background:rgba(124,58,237,.3);border-color:#7c3aed;color:#fff;transform:scale(1.05)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.4)}50%{box-shadow:0 0 20px 5px rgba(124,58,237,.2)}}
.footer{position:fixed;bottom:2rem;z-index:1;color:rgba(255,255,255,.3);font-size:.85rem}
.footer a{color:rgba(255,255,255,.5);text-decoration:none}
.particles{position:fixed;width:100%;height:100%;z-index:0;overflow:hidden}
.particle{position:absolute;width:3px;height:3px;background:#7c3aed;border-radius:50%;opacity:.5;animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(100vh) scale(0);opacity:0}50%{opacity:.8}100%{transform:translateY(-10vh) scale(1);opacity:0}}
</style>
</head>
<body>
<div class="bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="particles"></div>
<div class="content">
<div class="logo">Vybe</div>
<div class="tagline">Program Manager</div>
<a class="btn">Coming Soon</a>
</div>
<div class="footer">a <a href="https://www.1000problems.com">1000Problems</a> project</div>
<script>
const c=document.querySelector('.particles');
for(let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDuration=(4+Math.random()*6)+'s';p.style.animationDelay=Math.random()*6+'s';p.style.width=p.style.height=(1+Math.random()*3)+'px';c.appendChild(p)}
</script>
</body>
</html>
